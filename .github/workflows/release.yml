name: Release grasp video

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grasp-video:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config qt6-base-dev libqt6opengl6-dev \
            curl lsb-release gnupg bc ffmpeg python3-numpy python3-pil

      - name: Install Gazebo Harmonic
        run: |
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] \
            https://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_VECTOR_VIEW=ON -DBUILD_VECTOR_GUI=OFF -DBUILD_TESTS=ON

      - name: Build VectorView plugin
        run: cmake --build build -j"$(nproc)"

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Record grasp demo video
        run: ./scripts/record_release_video.sh grasp_demo.mp4

      - name: Upload video to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" grasp_demo.mp4 --clobber

      - name: Upload video artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: grasp-demo-video
          path: grasp_demo.mp4
          if-no-files-found: error
