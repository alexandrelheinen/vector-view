name: Noble build

on:
  push:
    branches: [master, cursor/**]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config qt6-base-dev libqt6opengl6-dev \
            curl lsb-release gnupg

      - name: Install Gazebo Harmonic
        run: |
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] \
            https://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Install Python tooling for trajectory and capture checks
        run: sudo apt-get install -y python3-numpy python3-pil python3-protobuf imagemagick ffmpeg

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_VECTOR_VIEW=ON -DBUILD_VECTOR_GUI=ON -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sim-comparison:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config qt6-base-dev libqt6opengl6-dev \
            curl lsb-release gnupg python3-numpy python3-pil python3-protobuf imagemagick
          sudo curl -fsSL https://packages.osrfoundation.org/gazebo.gpg \
            -o /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] \
            https://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_VECTOR_VIEW=ON -DBUILD_VECTOR_GUI=ON -DBUILD_TESTS=ON
          cmake --build build -j"$(nproc)"

      - name: Golden trajectory replay capture
        run: scripts/capture_comparison.sh /tmp/execution_comparison.png
